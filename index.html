<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Parking Morales</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      /* Splash que se ve inmediatamente */
      .instant-splash {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }
      
      .instant-splash img {
        width: 130px;
        height: 130px;
        border-radius: 30px;
        box-shadow: 0 0 20px rgba(245, 158, 11, 0.5), 0 0 40px rgba(245, 158, 11, 0.3);
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      
      /* Ocultar contenido hasta que React cargue */
      #root {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0f172a;
      }
    </style>
  </head>
  <body>
    <!-- Splash instantáneo -->
    <div class="instant-splash" id="instantSplash">
      <img src="/logo.png" alt="Parking Morales">
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Eliminar splash instantáneo cuando React esté listo
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('instantSplash');
          if (splash) {
            splash.style.transition = 'opacity 0.5s';
            splash.style.opacity = '0';
            setTimeout(function() {
              splash.remove();
            }, 500);
          }
        }, 500);
      });
    </script>
  </body>
</html>
